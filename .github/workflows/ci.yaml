name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**", "infra/**", "chore/**"]
  pull_request:
    branches: ["main"]

jobs:
  # ──────────────────────────────────────────
  # 1. Python 린트 (Ruff)
  # ──────────────────────────────────────────
  lint-backend:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - run: pip install ruff==0.8.0
      - run: ruff check backend/
      - run: ruff format --check backend/

  # ──────────────────────────────────────────
  # 2. TypeScript 타입 체크 + ESLint
  # ──────────────────────────────────────────
  lint-frontend:
    name: Frontend Lint (tsc + ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npx eslint src/
        working-directory: frontend

  # ──────────────────────────────────────────
  # 3. Bandit — Python 보안 취약점
  # ──────────────────────────────────────────
  security-backend:
    name: Backend Security (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - run: pip install bandit==1.8.0
      - run: bandit -r backend/app/ -ll

  # ──────────────────────────────────────────
  # 4. Checkov — k8s / Dockerfile 설정 스캔
  # ──────────────────────────────────────────
  security-infra:
    name: Infra Security (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
      - run: pip install checkov==3.2.332
      - run: >
          checkov -d k8s/ --framework kubernetes --quiet
          --skip-check CKV_K8S_14,CKV_K8S_15,CKV_K8S_43,CKV_K8S_35
        # CKV_K8S_14: image:latest — dev 로컬 빌드 이미지라 태그 고정 불가
        # CKV_K8S_15: imagePullPolicy:Always — dev는 Never 사용
        # CKV_K8S_43: image digest — 로컬 이미지는 digest 없음
        # CKV_K8S_35: secrets as files — envFrom secretRef는 현재 구조상 허용
      - run: checkov -d backend/ --framework dockerfile --quiet
      - run: checkov -d frontend/ --framework dockerfile --quiet

  # ──────────────────────────────────────────
  # 5. Trivy 빌드 전 — 패키지 취약점 (빠른 차단)
  # ──────────────────────────────────────────
  security-packages:
    name: Package Security (Trivy - pre-build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Trivy scan backend packages
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: backend/
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
      - name: Trivy scan frontend packages
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: frontend/
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  # ──────────────────────────────────────────
  # 6. Trivy 빌드 후 — 이미지 전체 스캔 (OS 포함)
  # ──────────────────────────────────────────
  security-image:
    name: Image Security (Trivy - post-build)
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, security-packages]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Build backend image
        run: docker build -t today-me-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t today-me-frontend:ci ./frontend
      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2  # v0.28.0
        with:
          image-ref: today-me-backend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2  # v0.28.0
        with:
          image-ref: today-me-frontend:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
